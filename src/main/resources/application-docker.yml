# Overrides activated with SPRING_PROFILES_ACTIVE=docker (used by docker-compose).
# Only hostnames change; all policy is inherited from application.yml.
spring:
  r2dbc:
    url: r2dbc:postgresql://postgres:5432/llmgateway
  flyway:
    url: jdbc:postgresql://postgres:5432/llmgateway
  data:
    redis:
      host: redis
      port: 6379

management:
  otlp:
    tracing:
      endpoint: http://jaeger:4318/v1/traces

gateway:
  ollama:
    # Ollama runs on the host, not in compose. host.docker.internal resolves
    # to the host from inside the container (see extra_hosts in docker-compose.yml).
    base-url: http://host.docker.internal:11434
