spring:
  application:
    name: llm-gateway

  # ---- R2DBC: reactive runtime data access ----
  r2dbc:
    url: r2dbc:postgresql://localhost:5432/llmgateway
    username: gateway
    password: gateway
    pool:
      initial-size: 5
      max-size: 20

  # ---- Flyway runs over a blocking JDBC connection at startup only ----
  flyway:
    enabled: true
    url: jdbc:postgresql://localhost:5432/llmgateway
    user: gateway
    password: gateway
    locations: classpath:db/migration

  # ---- Redis (Lettuce) for token buckets, budget counters, rolling windows ----
  data:
    redis:
      host: localhost
      port: 6379

# ---- Actuator + Prometheus + tracing exposure ----
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: ${spring.application.name}
  tracing:
    sampling:
      probability: 1.0          # sample everything locally; lower in prod
  otlp:
    tracing:
      endpoint: http://localhost:4318/v1/traces

server:
  port: 8080

# Use Java 21 virtual threads for any blocking work that escapes the reactive chain.
spring.threads.virtual.enabled: true

# =====================================================================
# Gateway-specific policy. All of this is hot-reloadable conceptually and
# can be overridden per environment. Models here are LOCAL OLLAMA models.
# =====================================================================
gateway:
  ollama:
    base-url: http://localhost:11434
    # Per-request upstream timeout. Ollama on CPU can be slow for the first token.
    request-timeout: 120s
    connect-timeout: 5s

  # The set of models the gateway knows about. Each maps to an Ollama model tag.
  # `tier` is informational and used for routing/labelling.
  models:
    - name: llama3.1
      tier: standard
    - name: gemma3
      tier: standard
    - name: "gemma3:1b"
      tier: fast

  # Synthetic per-1K-token prices in USD. Ollama is free, but the gateway
  # simulates cost so budget enforcement is observable. Tune freely.
  pricing:
    "[llama3.1]":
      input-per-1k: 0.00050
      output-per-1k: 0.00150
    gemma3:
      input-per-1k: 0.00025
      output-per-1k: 0.00075
    "gemma3:1b":
      input-per-1k: 0.00010
      output-per-1k: 0.00020

  # Fallback chains: requested model -> ordered alternatives.
  # The router walks the chain until it finds a HEALTHY model.
  fallback-chains:
    "[llama3.1]": [gemma3, "gemma3:1b"]
    gemma3: ["gemma3:1b"]

  # Per-team enrichment profiles. Applied before the request is forwarded.
  enrichment:
    profiles:
      enterprise:
        system-prefix: "You are operating under ACME Corp compliance policy. Be accurate and cite uncertainty."
        disclaimer-suffix: "\n\n[This response was generated by an AI system and may contain errors. Verify before acting.]"
      internal:
        system-prefix: ""
        disclaimer-suffix: ""

  resilience:
    health-check:
      interval: 30s
      rolling-window: 5m
      degraded-error-rate: 0.20      # >=20% errors over the window => DEGRADED
      down-error-rate: 0.50          # >=50% errors over the window => DOWN
      ping-num-predict: 1            # tiny generation for health pings
    retry:
      max-attempts: 3
      initial-backoff: 100ms
      multiplier: 2.0
      max-backoff: 1s
    circuit-breaker:
      sliding-window-size: 10
      failure-rate-threshold: 50     # percent
      minimum-number-of-calls: 5
      wait-duration-in-open-state: 30000
      permitted-calls-in-half-open: 1

  budget:
    flush-interval: 60000              # Redis -> Postgres spend flush cadence
    warn-threshold-pct: 80

  alerts:
    slack:
      # Leave blank to disable Slack. The gateway will just log alerts instead.
      webhook-url: ""

# Resilience4j instances are created programmatically in Resilience4jConfig,
# but the management binding below exposes their metrics to Micrometer.
resilience4j:
  circuitbreaker:
    metrics:
      enabled: true
  retry:
    metrics:
      enabled: true

logging:
  level:
    com.llmgateway: INFO
